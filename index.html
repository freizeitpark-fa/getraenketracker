<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07182f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="CruiseSip" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="icons/favicon-32x32.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <title>CruiseSip Getränketracker</title>
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="title">
        <h1>CruiseSip</h1>
        <p id="subtitle">Version 3.0.0 · AIDA 01.11.2025</p>
      </div>
      <button id="menuBtn" class="iconbtn" aria-label="Menü">☰</button>
    </header>

    <nav class="topnav" aria-label="Hauptnavigation">
      <button data-route="home" class="tab active">Start</button>
      <button data-route="track" class="tab">Tracken</button>
      <button data-route="history" class="tab">Verlauf</button>
      <button data-route="stats" class="tab">Auswertung</button>
      <button data-route="trips" class="tab">Reisen</button><button data-route="settings" class="tab">Setup</button>
    </nav>

    <main id="view"></main>
    <div id="undoDock" class="undoDock" hidden></div>

    <nav class="tabs" aria-label="Schnellnavigation">
      <button data-route="home" class="tab active">⌂<span>Start</span></button>
      <button data-route="track" class="tab">＋<span>Tracken</span></button>
      <button data-route="history" class="tab">↺<span>Verlauf</span></button>
      <button data-route="stats" class="tab">∑<span>Auswertung</span></button>
      <button data-route="data" class="tab">⋯<span>Mehr</span></button>
    </nav>
  </div>

  <dialog id="menuDialog">
    <form method="dialog" class="menu">
      <h2>Menü</h2>
      <button value="home">Start</button>
      <button value="track">Getränk erfassen</button>
      <button value="history">Verlauf bearbeiten</button>
      <button value="stats">Auswertung</button>
      <button value="trips">Reisen verwalten</button>
      <button value="settings">Personen / Gerät</button>
      <button value="data">Import / Export / Info</button>
      <button value="close">Schließen</button>
    </form>
  </dialog>

  <dialog id="editDialog">
    <form method="dialog" class="menu" id="editForm">
      <h2 id="editTitle">Eintrag bearbeiten</h2>
      <input type="hidden" id="editId" />
      <label>Reise<select id="editTrip"></select></label>
      <label>Person<select id="editPerson"></select></label>
      <label>Getränk<select id="editDrink"></select></label>
      <label>Preis<input id="editPrice" type="number" step="0.01" /></label>
      <label>Paketstatus<select id="editStatus"><option value="included">enthalten</option><option value="not_included">nicht enthalten</option><option value="unclear">unklar</option></select></label>
      <label>Datum/Uhrzeit<input id="editTs" type="datetime-local" /></label>
      <menu>
        <button value="cancel" type="submit">Abbrechen</button>
        <button value="save" class="primary" type="submit">Speichern</button>
      </menu>
    </form>
  </dialog>

  <input id="fileInput" type="file" hidden />
  <script src="app.js" defer></script>
</body>
</html>
